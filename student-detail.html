<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 상세 — 제이비스포츠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/notion-editor.css" />
</head>
<body class="app-body">
  <div class="app-layout" id="appLayout">
    <aside class="app-sidebar" id="app-sidebar"></aside>
    <div class="app-column">
      <header class="app-topbar" id="app-topbar"></header>
      <main class="app-content">
        <div class="app-page-head">
          <h2>학생 상세</h2>
          <p><a href="students.html" style="color:var(--orange-bright)">← 목록</a></p>
        </div>
        <div class="panel-card">
          <dl class="detail-dl">
            <dt>이름</dt><dd id="stuName">—</dd>
            <dt>생년월일</dt><dd id="stuBirth">—</dd>
            <dt>연락처</dt><dd id="stuPhone">—</dd>
            <dt>보호자</dt><dd id="stuParent">—</dd>
            <dt>학교</dt><dd id="stuSchool">—</dd>
            <dt>비상 연락</dt><dd id="stuEmergency">—</dd>
          </dl>
          <p class="content-section-title">고유 링크</p>
          <div class="permalink-row">
            <input class="auth-input" id="permalink" readonly />
            <button type="button" class="btn btn--secondary btn--sm" id="btnCopyLink">복사</button>
          </div>
          <div class="modal-account-actions" style="margin-top: 1rem">
            <button type="button" class="btn btn--primary" id="btnEdit">수정</button>
            <button type="button" class="btn btn--secondary" id="btnDelete">삭제</button>
          </div>
        </div>
        <p class="content-section-title">추가 메모</p>
        <div id="studentNotesReadonly" class="notion-editor-wrap"></div>
      </main>
    </div>
  </div>
  <script src="auth-config.js"></script>
  <script src="auth.js"></script>
  <script src="app-data.js"></script>
  <script src="js/jb-content-api.js"></script>
  <script src="app-shell.js"></script>
  <script>
    JBAppShell.init({ activeNav: "studentsReg", pageTitle: "제이비스포츠 관리프로그램" });
  </script>
  <script type="module" src="js/student-detail.mjs"></script>
  <script src="live-reload.js"></script>
</body>
</html>
