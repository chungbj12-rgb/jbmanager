<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0, minimum-scale=0.25, maximum-scale=5" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>보강관리 — 제이비스포츠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260406" />
  <link rel="stylesheet" href="css/members-page.css?v=20260406" />
  <link rel="stylesheet" href="css/trials-page.css?v=20260406" />
</head>
<body class="app-body" data-page="makeup-v2">
  <div class="app-layout" id="appLayout">
    <aside class="app-sidebar" id="app-sidebar"></aside>
    <div class="app-column">
      <header class="app-topbar" id="app-topbar"></header>
      <main class="app-content">
        <div class="trial-workspace">
          <h2 class="trial-page-title">보강관리</h2>
          <p class="trial-page-sub">보강상담 · 보강신청(학부모 링크 자동 반영) · 예약확정/예약변경 알림</p>

          <div class="trial-workspace-tabs members-toolbar__filters" role="tablist" aria-label="보강 구분">
            <button type="button" class="members-filter-btn" id="mkWorkspaceTabConsult" role="tab" aria-selected="false">보강상담</button>
            <button type="button" class="members-filter-btn is-on" id="mkWorkspaceTabApply" role="tab" aria-selected="true">보강신청</button>
          </div>

          <div id="panelMkConsult" class="trial-panel trial-panel--consult" hidden>
            <div class="trial-toolbar">
              <div class="trial-toolbar__center" style="flex: 0 1 auto">
                <button type="button" class="btn-trial-register" id="btnMkConsultOpen" aria-label="보강상담 등록">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                    <path d="M12 5v14M5 12h14" />
                  </svg>
                  보강상담 등록
                </button>
              </div>
              <div class="trial-toolbar__right">
                <div class="trial-count-row">
                  <span id="mkConsultCount" class="trial-count">상담 0건</span>
                </div>
                <button type="button" class="btn-trial-delete" id="btnMkConsultBulkDelete" disabled aria-label="선택 항목 삭제">삭제</button>
                <div class="trial-search-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                  </svg>
                  <input type="search" class="trial-search" id="mkConsultSearch" placeholder="이름·전화번호 검색…" autocomplete="off" />
                </div>
              </div>
            </div>

            <div class="trial-table-card">
              <div class="trial-table-wrap">
                <table class="trial-table">
                  <thead>
                    <tr>
                      <th><input type="checkbox" id="mkConsultCbSelectAll" class="member-cb" title="현재 페이지 전체 선택" aria-label="현재 페이지 전체 선택" /></th>
                      <th>이름</th>
                      <th>전화번호</th>
                      <th>원래클래스</th>
                      <th>결석예정일</th>
                      <th>상담여부</th>
                    </tr>
                  </thead>
                  <tbody id="mkConsultTbody"></tbody>
                </table>
              </div>
              <div class="trial-pager">
                <button type="button" id="mkConsultPrev" aria-label="이전 페이지">이전</button>
                <span id="mkConsultPageInfo">1 / 1</span>
                <button type="button" id="mkConsultNext" aria-label="다음 페이지">다음</button>
                <label class="members-page-size-label" for="mkConsultPageSize">페이지당</label>
                <select id="mkConsultPageSize" class="members-page-size-select mb-select" aria-label="페이지당 표시 수">
                  <option value="50">50</option>
                  <option value="100">100</option>
                  <option value="300">300</option>
                </select>
              </div>
            </div>
          </div>

          <div id="panelMkApply" class="trial-panel trial-panel--apply">
            <div class="trial-toolbar">
              <div class="trial-toolbar__center"></div>
              <div class="trial-toolbar__right">
                <div class="trial-count-row">
                  <span id="mkApplyCount" class="trial-count">전체 보강: 0명</span>
                </div>
                <button type="button" class="btn-trial-delete" id="btnMkApplyBulkDelete" disabled aria-label="선택 항목 삭제">삭제</button>
                <div class="trial-search-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                  </svg>
                  <input type="search" class="trial-search" id="mkApplySearch" placeholder="회원이름으로 검색…" autocomplete="off" />
                </div>
              </div>
            </div>

            <div class="trial-table-card">
              <div class="trial-table-wrap">
                <table class="trial-table">
                  <thead>
                    <tr>
                      <th><input type="checkbox" id="mkApplyCbSelectAll" class="member-cb" title="현재 페이지 전체 선택" aria-label="현재 페이지 전체 선택" /></th>
                      <th>회원이름</th>
                      <th>원래클래스</th>
                      <th>결석날짜</th>
                      <th>보강클래스</th>
                      <th>보강날짜</th>
                      <th>상태</th>
                    </tr>
                  </thead>
                  <tbody id="mkApplyTbody"></tbody>
                </table>
              </div>
              <div class="trial-pager">
                <button type="button" id="mkApplyPrev" aria-label="이전 페이지">이전</button>
                <span id="mkApplyPageInfo">1 / 1</span>
                <button type="button" id="mkApplyNext" aria-label="다음 페이지">다음</button>
                <label class="members-page-size-label" for="mkApplyPageSize">페이지당</label>
                <select id="mkApplyPageSize" class="members-page-size-select mb-select" aria-label="페이지당 표시 수">
                  <option value="50">50</option>
                  <option value="100">100</option>
                  <option value="300">300</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="mkConsultModal" class="members-modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="mkConsultModalTitle">
    <div class="members-modal">
      <div class="members-modal__head">
        <h3 id="mkConsultModalTitle">보강상담 등록</h3>
        <button type="button" class="members-modal__close" id="mkConsultModalClose" aria-label="닫기">×</button>
      </div>
      <form id="mkConsultForm" class="trial-modal__body">
        <div id="mkConsultModalErr" class="trial-modal__err" hidden role="alert"></div>
        <div class="mb-field">
          <label class="trial-label-req" for="mkConsultName">이름</label>
          <input class="mb-input" type="text" id="mkConsultName" autocomplete="name" required />
        </div>
        <div class="mb-field">
          <label class="trial-label-req" for="mkConsultPhone">전화번호</label>
          <input class="mb-input" type="tel" id="mkConsultPhone" inputmode="numeric" placeholder="010-0000-0000" autocomplete="tel" required />
        </div>
        <div class="mb-field">
          <label class="trial-label-req" for="mkConsultOrigClass">원래클래스</label>
          <input class="mb-input" type="text" id="mkConsultOrigClass" required />
        </div>
        <div class="mb-field">
          <label for="mkConsultAbsence">결석예정일</label>
          <input class="mb-input" type="date" id="mkConsultAbsence" />
        </div>
        <div class="trial-modal-actions">
          <button type="button" class="btn btn--secondary" id="mkConsultCancel">취소</button>
          <button type="submit" class="btn btn--primary">등록</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/ui-dialog.js"></script>
  <script src="auth-config.js"></script>
  <script src="js/jb-auth-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
  <script src="js/jb-supabase-client.js"></script>
  <script src="js/jb-remote-sync.js"></script>
  <script src="app-preferences.js"></script>
  <script src="auth.js"></script>
  <script src="app-data.js"></script>
  <script src="app-shell.js"></script>
  <script src="js/makeup-page.js?v=20260406"></script>
  <script src="live-reload.js"></script>
</body>
</html>
