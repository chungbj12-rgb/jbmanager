<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — 제이비스포츠 배구전문센터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-auth-body">
  <div class="page-auth">
    <div class="auth-card auth-card--plain">
      <header class="auth-header">
        <h1 class="auth-title">회원가입</h1>
        <p class="auth-subtitle">제이비스포츠 배구전문센터</p>
      </header>

      <div id="formError" class="auth-banner auth-banner--error" hidden role="alert"></div>

      <form id="signupForm" class="auth-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="name">이름</label>
          <input class="auth-input" id="name" name="name" type="text" autocomplete="name" placeholder="홍길동" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="birth">생년월일</label>
          <input class="auth-input" id="birth" name="birth" type="text" inputmode="numeric" maxlength="6" placeholder="YYMMDD (예: 881010)" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="phone">전화번호</label>
          <input class="auth-input" id="phone" name="phone" type="tel" autocomplete="tel" placeholder="010-XXXX-XXXX" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="email">이메일 주소</label>
          <input class="auth-input" id="email" name="email" type="email" autocomplete="email" placeholder="example@email.com" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password">비밀번호</label>
          <input class="auth-input" id="password" name="password" type="password" autocomplete="new-password" placeholder="8자 이상" minlength="8" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="passwordConfirm">비밀번호 확인</label>
          <input class="auth-input" id="passwordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" placeholder="비밀번호 재입력" required />
        </div>
        <div class="auth-field">
          <label class="auth-label" for="position">직책</label>
          <div class="auth-select-wrap">
            <select class="auth-input auth-select" id="position" name="position" required>
              <option value="">직책을 선택해주세요</option>
              <option value="대표">대표</option>
              <option value="실장">실장</option>
              <option value="코치">코치</option>
              <option value="차량선생님">차량선생님</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--block">회원가입</button>
      </form>

      <a class="auth-back" href="index.html">
        <span class="auth-back__icon" aria-hidden="true">←</span>
        돌아가기
      </a>
    </div>
  </div>

  <div id="successModal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-dialog">
      <h2 id="modalTitle" class="modal-title">가입 완료</h2>
      <p class="modal-text">
        회원가입이 완료되었습니다. 등록하신 전화번호와 비밀번호를 이용해서 로그인 해주세요.
      </p>
      <button type="button" class="btn btn--primary btn--block" id="goLoginBtn">로그인으로 이동</button>
    </div>
  </div>

    <script src="js/ui-dialog.js"></script>
  <script src="auth-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
  <script src="js/jb-supabase-client.js"></script>
  <script src="js/jb-remote-sync.js"></script>
  <script src="app-preferences.js"></script>
  <script src="auth.js"></script>
  <script>
    (function () {
      var form = document.getElementById("signupForm");
      var formError = document.getElementById("formError");
      var modal = document.getElementById("successModal");
      var goLoginBtn = document.getElementById("goLoginBtn");

      function showErrors(errors) {
        formError.textContent = errors.join(" ");
        formError.hidden = false;
      }

      function clearErrors() {
        formError.hidden = true;
        formError.textContent = "";
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        clearErrors();

        var data = {
          name: document.getElementById("name").value,
          birth: document.getElementById("birth").value,
          phone: document.getElementById("phone").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
          passwordConfirm: document.getElementById("passwordConfirm").value,
          position: document.getElementById("position").value,
        };

        var reg = await JBAuth.register(data);
        if (!reg.ok) {
          showErrors(reg.errors);
          return;
        }

        var loginRes = await JBAuth.login(data.phone, data.password);
        if (loginRes.ok) {
          location.href = "main.html";
          return;
        }

        modal.hidden = false;
        document.body.classList.add("modal-open");
      });

      goLoginBtn.addEventListener("click", function () {
        location.href = "login.html";
      });

      modal.addEventListener("click", function (e) {
        if (e.target === modal) {
          /* 배경 클릭으로 닫지 않음 — 로그인 이동 유도 */
        }
      });
    })();
  </script>
  <script src="live-reload.js"></script>
</body>
</html>
