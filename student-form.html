<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 등록 — 제이비스포츠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/notion-editor.css" />
</head>
<body class="app-body">
  <div class="app-layout" id="appLayout">
    <aside class="app-sidebar" id="app-sidebar"></aside>
    <div class="app-column">
      <header class="app-topbar" id="app-topbar"></header>
      <main class="app-content">
        <div class="app-page-head">
          <h2 id="pageTitleLabel">학생 등록</h2>
          <p>필수 정보와 노션 스타일 메모를 함께 저장합니다</p>
        </div>
        <div id="formErr" class="auth-banner auth-banner--error" hidden role="alert"></div>
        <form id="studentForm" class="data-card" style="padding: 1.25rem">
          <div class="content-form-grid">
            <div class="auth-field">
              <label class="auth-label" for="stuName">이름 *</label>
              <input class="auth-input" id="stuName" required autocomplete="name" />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="stuBirth">생년월일 * (YYMMDD)</label>
              <input class="auth-input" id="stuBirth" required inputmode="numeric" maxlength="6" placeholder="060315" />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="stuPhone">학생 연락처 *</label>
              <input class="auth-input" id="stuPhone" type="tel" required autocomplete="tel" placeholder="010-0000-0000" />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="stuParent">보호자 연락처</label>
              <input class="auth-input" id="stuParent" type="tel" autocomplete="tel" />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="stuSchool">학교</label>
              <input class="auth-input" id="stuSchool" />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="stuEmergency">비상 연락망</label>
              <input class="auth-input" id="stuEmergency" placeholder="관계·이름·번호" />
            </div>
          </div>
          <p class="content-section-title">추가 메모 (노션 스타일)</p>
          <div id="studentNotesEditor" class="notion-editor-wrap"></div>
          <div class="modal-account-actions" style="margin-top: 1rem">
            <button type="submit" class="btn btn--primary">저장</button>
            <button type="button" class="btn btn--secondary" id="btnCancel">취소</button>
          </div>
        </form>
      </main>
    </div>
  </div>
  <script src="auth-config.js"></script>
  <script src="auth.js"></script>
  <script src="app-data.js"></script>
  <script src="js/jb-content-api.js"></script>
  <script src="app-shell.js"></script>
  <script>
    JBAppShell.init({ activeNav: "studentsReg", pageTitle: "제이비스포츠 관리프로그램" });
  </script>
  <script type="module" src="js/student-form.mjs"></script>
  <script src="live-reload.js"></script>
</body>
</html>
