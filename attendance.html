<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>출결관리 — 제이비스포츠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-body">
  <div class="app-layout" id="appLayout">
    <aside class="app-sidebar" id="app-sidebar"></aside>
    <div class="app-column">
      <header class="app-topbar" id="app-topbar"></header>
      <main class="app-content">
        <div class="app-page-head">
          <h2>출결관리</h2>
          <p>날짜별 출석 체크 (대시보드 오늘 출석에 반영)</p>
        </div>
        <div class="data-toolbar">
          <div>
            <label class="auth-label" for="adate">기준일</label>
            <input class="auth-input" id="adate" type="date" style="max-width: 12rem" />
          </div>
          <button type="button" class="btn btn--primary" id="saveBtn">변경 사항 저장</button>
        </div>
        <div class="data-card">
          <div class="data-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>출석</th>
                  <th>이름</th>
                  <th>전화번호</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="auth-config.js"></script>
  <script src="auth.js"></script>
  <script src="app-data.js"></script>
  <script src="app-shell.js"></script>
  <script>
    (function () {
      JBAppShell.init({ activeNav: "attendance", pageTitle: "제이비스포츠 관리프로그램" });
      if (!JBAuth.getCurrentUser()) return;
      var dateEl = document.getElementById("adate");
      dateEl.value = JBData.dateKey(new Date());
      var tb = document.getElementById("tbody");

      function isPresent(dateStr, memberId) {
        return JBData.getAttendanceRecords().some(function (r) {
          return r.date === dateStr && r.memberId === memberId && r.present;
        });
      }

      function render() {
        var d = dateEl.value || JBData.dateKey(new Date());
        var members = JBData.getMembers().slice().sort(function (a, b) {
          return (a.name || "").localeCompare(b.name || "");
        });
        tb.innerHTML = members
          .map(function (m) {
            var on = isPresent(d, m.id) ? " checked" : "";
            return (
              "<tr>" +
              '<td><input type="checkbox" data-mid="' +
              m.id +
              '"' +
              on +
              " /></td>" +
              "<td>" +
              (m.name || "") +
              "</td>" +
              "<td>" +
              (m.phone || "") +
              "</td>" +
              "</tr>"
            );
          })
          .join("");
      }

      dateEl.addEventListener("change", render);

      document.getElementById("saveBtn").addEventListener("click", function () {
        var d = dateEl.value || JBData.dateKey(new Date());
        var checks = tb.querySelectorAll("input[type=checkbox][data-mid]");
        for (var i = 0; i < checks.length; i++) {
          var el = checks[i];
          JBData.setAttendanceForDate(d, el.dataset.mid, el.checked);
        }
        alert("저장했습니다.");
        render();
      });

      render();
    })();
  </script>
  <script src="live-reload.js"></script>
</body>
</html>
