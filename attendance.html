<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0, minimum-scale=0.25, maximum-scale=5" />
  <title>출결관리 — 제이비스포츠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/members-page.css" />
  <link rel="stylesheet" href="css/attendance-page.css" />
</head>
<body class="app-body page-attendance">
  <div class="app-layout" id="appLayout">
    <aside class="app-sidebar" id="app-sidebar"></aside>
    <div class="app-column">
      <header class="app-topbar" id="app-topbar"></header>
      <main class="app-content">
        <div class="att-workspace">
          <h2 class="att-page-title">출결관리</h2>

          <div class="att-toolbar">
            <div class="att-date-nav">
              <button type="button" class="att-date-nav__btn" id="attDatePrev" aria-label="이전 날짜">‹</button>
              <label class="att-date-nav__label" style="position: relative; cursor: pointer; padding: 0.2rem 0.35rem">
                <input
                  type="date"
                  id="attDateInput"
                  style="position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer"
                  title="날짜 선택"
                />
                <span id="attDateLabel"></span>
              </label>
              <button type="button" class="att-date-nav__btn" id="attDateNext" aria-label="다음 날짜">›</button>
            </div>
            <select id="attClassSelect" class="att-class-select" aria-label="클래스 선택"></select>
          </div>

          <p id="attEmptyHint" class="att-empty-hint" hidden></p>

          <div class="att-table-card">
            <div class="att-table-wrap">
              <table class="att-table">
                <thead>
                  <tr>
                    <th class="att-col-div">구분</th>
                    <th class="att-col-name">이름</th>
                    <th class="att-col-phone">전화번호</th>
                    <th class="att-col-status">출석여부</th>
                    <th class="att-col-note">특이사항</th>
                  </tr>
                </thead>
                <tbody id="attTbody"></tbody>
              </table>
            </div>
          </div>

          <div class="att-footer">
            <button type="button" class="att-btn-add" id="attBtnAdd">
              <span aria-hidden="true">+</span> 추가
            </button>
            <button type="button" class="att-btn-save" id="attBtnSave">
              <span aria-hidden="true">💾</span> 저장
            </button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/ui-dialog.js"></script>
  <script src="auth-config.js"></script>
  <script src="js/jb-auth-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
  <script src="js/jb-supabase-client.js"></script>
  <script src="js/jb-remote-sync.js"></script>
  <script src="app-preferences.js"></script>
  <script src="auth.js"></script>
  <script src="app-data.js"></script>
  <script src="app-shell.js"></script>
  <script src="js/attendance-page.js"></script>
  <script src="live-reload.js"></script>
</body>
</html>
