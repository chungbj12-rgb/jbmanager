<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>셔틀관리 — 제이비스포츠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-body">
  <div class="app-layout" id="appLayout">
    <aside class="app-sidebar" id="app-sidebar"></aside>
    <div class="app-column">
      <header class="app-topbar" id="app-topbar"></header>
      <main class="app-content">
        <div class="app-page-head">
          <h2>셔틀관리</h2>
          <p>노선·시간·인원 등 셔틀 운행 정보를 기록합니다</p>
        </div>
        <div class="data-card">
          <div class="data-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>노선명</th>
                  <th>운행일</th>
                  <th>시간</th>
                  <th>기사/비고</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <form class="inline-form" id="f">
            <div>
              <label class="auth-label" for="route">노선명</label>
              <input class="auth-input" id="route" required />
            </div>
            <div>
              <label class="auth-label" for="d">운행일</label>
              <input class="auth-input" id="d" type="date" />
            </div>
            <div>
              <label class="auth-label" for="t">시간</label>
              <input class="auth-input" id="t" type="time" />
            </div>
            <div class="full">
              <label class="auth-label" for="note">기사·비고</label>
              <input class="auth-input" id="note" />
            </div>
            <div><button type="submit" class="btn btn--primary">추가</button></div>
          </form>
        </div>
      </main>
    </div>
  </div>
  <script src="auth-config.js"></script>
  <script src="auth.js"></script>
  <script src="app-data.js"></script>
  <script src="app-shell.js"></script>
  <script>
    (function () {
      JBAppShell.init({ activeNav: "shuttle", pageTitle: "제이비스포츠 관리프로그램" });
      if (!JBAuth.getCurrentUser()) return;
      document.getElementById("d").value = JBData.dateKey(new Date());
      var tb = document.getElementById("tbody");

      function render() {
        tb.innerHTML = JBData.getShuttleRecords()
          .slice()
          .reverse()
          .map(function (r) {
            return (
              "<tr><td>" +
              (r.routeName || "") +
              "</td><td>" +
              (r.runDate || "") +
              "</td><td>" +
              (r.timeSlot || "") +
              "</td><td>" +
              (r.note || "") +
              '</td><td class="cell-actions"><button type="button" class="linkish" data-id="' +
              r.id +
              '">삭제</button></td></tr>'
            );
          })
          .join("");
      }

      tb.addEventListener("click", function (e) {
        if (e.target.dataset.id && confirm("삭제할까요?")) {
          JBData.saveShuttleRecords(JBData.getShuttleRecords().filter(function (x) { return x.id !== e.target.dataset.id; }));
          render();
        }
      });

      document.getElementById("f").addEventListener("submit", function (e) {
        e.preventDefault();
        var list = JBData.getShuttleRecords();
        list.push({
          id: "sh-" + Date.now(),
          routeName: document.getElementById("route").value.trim(),
          runDate: document.getElementById("d").value,
          timeSlot: document.getElementById("t").value || "-",
          note: document.getElementById("note").value.trim(),
        });
        JBData.saveShuttleRecords(list);
        e.target.reset();
        document.getElementById("d").value = JBData.dateKey(new Date());
        render();
      });
      render();
    })();
  </script>
  <script src="live-reload.js"></script>
</body>
</html>
