<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스튜디오 — 예시 vs 라이브 미리보기</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, "Segoe UI", "Malgun Gothic", sans-serif; }
    body {
      display: flex;
      flex-direction: column;
      background: #1a1d24;
      color: #e8eaed;
    }
    .bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.6rem 1rem;
      background: #0f1117;
      border-bottom: 1px solid #2a2f3a;
    }
    .bar h1 {
      margin: 0;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .bar .hint {
      font-size: 0.72rem;
      color: #8b9199;
      flex: 1;
      min-width: 12rem;
    }
    .bar button {
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      border: 1px solid #3d4450;
      background: #252a35;
      color: #fff;
      cursor: pointer;
    }
    .bar button:hover { background: #323845; }
    .bar button.primary {
      background: #e85a28;
      border-color: #c73d12;
    }
    .bar button.primary:hover { background: #ff6b35; }
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid #2a2f3a;
    }
    .panel:last-child { border-right: 0; border-top: 1px solid #2a2f3a; }
    @media (min-width: 901px) {
      .panel:last-child { border-top: 0; }
    }
    .panel__label {
      flex-shrink: 0;
      padding: 0.35rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8b9199;
      background: #14171f;
    }
    .panel__body {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #0a0c10;
    }
    .ref-scroll {
      position: absolute;
      inset: 0;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .ref-scroll img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #050508;
    }
  </style>
</head>
<body>
  <div class="bar">
    <h1>제이비스포츠 · 비교 스튜디오</h1>
    <span class="hint">프로젝트 루트의 <code style="background:#252a35;padding:0.15rem 0.35rem;border-radius:4px;">python preview_server.py --open</code> 또는 <code style="background:#252a35;padding:0.15rem 0.35rem;border-radius:4px;">start-studio.bat</code> — 루트의 .html / .css / .js 저장 시 이 페이지가 자동 새로고침됩니다.</span>
    <button type="button" class="primary" id="reload">미리보기 새로고침</button>
    <button type="button" id="openIndex">index만 새 탭</button>
  </div>
  <div class="grid">
    <section class="panel" aria-label="예시 이미지">
      <div class="panel__label">예시 이미지 (참고)</div>
      <div class="panel__body">
        <div class="ref-scroll">
          <img src="assets/reference-mockup.png" alt="디자인 예시" width="800" height="1200" />
        </div>
      </div>
    </section>
    <section class="panel" aria-label="라이브 미리보기">
      <div class="panel__label">라이브 (index.html + styles.css)</div>
      <div class="panel__body">
        <iframe id="live" src="index.html" title="라이브 미리보기"></iframe>
      </div>
    </section>
  </div>
  <script>
    (function () {
      var live = document.getElementById("live");
      function bump() {
        live.src = "index.html?t=" + Date.now();
      }
      document.getElementById("reload").addEventListener("click", bump);
      document.getElementById("openIndex").addEventListener("click", function () {
        window.open("index.html", "_blank", "noopener");
      });
    })();
  </script>
  <script src="live-reload.js"></script>
</body>
</html>
